<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALDREA • NEON GATEWAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-blue);
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 0%, rgba(255, 0, 255, 0.05) 50%),
                        linear-gradient(90deg, transparent 0%, rgba(0, 255, 255, 0.05) 50%);
            background-size: 30px 30px;
            z-index: -1;
        }

        h1 {
            font-size: 4rem;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            margin-bottom: 10px;
            letter-spacing: 5px;
            text-align: center;
        }

        #forum-link {
            margin-bottom: 30px;
            padding: 12px 24px;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            text-decoration: none;
            font-size: 1.4rem;
            transition: all 0.3s ease;
        }
        #forum-link:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        #game-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            width: 95%;
            max-width: 1400px;
        }

        .game-card {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--neon-blue);
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .game-card:hover {
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .slideshow {
            width: 100%;
            height: 200px;
            position: relative;
            background: #111;
            border-bottom: 2px solid var(--neon-blue);
        }

        .slideshow img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            image-rendering: pixelated;
        }

        .slideshow img.active { opacity: 1; }

        .game-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-title {
            font-size: 2.2rem;
            text-transform: uppercase;
            color: var(--neon-blue);
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: block;
            padding: 10px;
            text-decoration: none;
            font-size: 1.2rem;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            transition: 0.2s;
        }

        .btn:hover { background: var(--neon-blue); color: #000; }

        .btn-download { border-color: var(--neon-pink); color: var(--neon-pink); }
        .btn-download:hover { background: var(--neon-pink); color: #000; }

        #status { font-size: 1.5rem; color: var(--neon-pink); margin-top: 40px; }
    </style>
</head>
<body>

    <h1>SYSTEM TERMINAL</h1>
    
    <a id="forum-link" href="https://github.com/valdrea/My-Games/issues/new/choose" target="_blank">
        [ ACCESS COMMUNITY FORUM / REPORT BUGS ]
    </a>

    <div id="status">SCANNING STORAGE SECTORS...</div>
    <div id="game-container"></div>

    <script>
        const USERNAME = 'valdrea';
        const REPO = 'My-Games';

        async function scanGames() {
            const container = document.getElementById('game-container');
            const status = document.getElementById('status');

            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
                const items = await response.json();
                status.style.display = 'none';
                
                // Filter folders (ignoring internal GitHub folders)
                const folders = items.filter(item => item.type === 'dir' && !item.name.startsWith('.'));

                for (const folder of folders) {
                    const contentResponse = await fetch(folder.url);
                    const contents = await contentResponse.json();
                    
                    const hasWeb = contents.some(file => file.name === 'index.html');
                    const hasInstaller = contents.some(file => file.name === 'Installer.exe');
                    const hasAudio = contents.some(file => file.name === 'AudioPack.exe');

                    const card = document.createElement('div');
                    card.className = 'game-card';

                    // BUTTON LOGIC
                    let buttonHTML = '';
                    if (hasWeb) {
                        buttonHTML = `<a href="./${folder.name}/index.html" class="btn">[ PLAY WEB VERSION ]</a>`;
                    } else {
                        if (hasInstaller) {
                            buttonHTML += `<a href="./${folder.name}/Installer.exe" class="btn btn-download">[ DOWNLOAD GAME ]</a>`;
                        }
                        if (hasAudio) {
                            buttonHTML += `<a href="./${folder.name}/AudioPack.exe" class="btn btn-download" style="margin-top:5px; border-style:dashed;">[ DOWNLOAD AUDIO PACK ]</a>`;
                        }
                    }

                    if (!buttonHTML) buttonHTML = `<div style="color:#444;">[ DATA CORRUPTED / NO EXECUTABLE ]</div>`;

                    card.innerHTML = `
                        <div class="slideshow" id="slideshow-${folder.name}">
                            <img class="active" src="./${folder.name}/preview.png" onerror="this.src='https://placehold.co/400x250/000/0ff?text=SCANNING...'">
                            <img src="./${folder.name}/preview1.png" onerror="this.style.display='none'">
                            <img src="./${folder.name}/preview2.png" onerror="this.style.display='none'">
                        </div>
                        <div class="game-info">
                            <div class="game-title">${folder.name.replace(/-/g, ' ')}</div>
                            <div class="btn-group">${buttonHTML}</div>
                        </div>
                    `;
                    container.appendChild(card);
                    startSlideshow(`slideshow-${folder.name}`);
                }
            } catch (error) {
                status.innerHTML = "FATAL ERROR: REPOSITORY UNREACHABLE.";
            }
        }

        function startSlideshow(containerId) {
            // Give GitHub 1 second to actually find the images before we start rotating
            setTimeout(() => {
                const images = Array.from(document.querySelectorAll(`#${containerId} img`)).filter(img => img.style.display !== 'none');
                if (images.length <= 1) return;
                
                let currentIndex = 0;
                setInterval(() => {
                    images[currentIndex].classList.remove('active');
                    currentIndex = (currentIndex + 1) % images.length;
                    images[currentIndex].classList.add('active');
                }, 3000);
            }, 1000);
        }

        scanGames();
    </script>
</body>
</html>
