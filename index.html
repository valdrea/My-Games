<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALDREA • NEON GATEWAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-blue);
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 80s Grid Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 0%, rgba(255, 0, 255, 0.05) 50%),
                        linear-gradient(90deg, transparent 0%, rgba(0, 255, 255, 0.05) 50%);
            background-size: 30px 30px;
            z-index: -1;
        }

        h1 {
            font-size: 4rem;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            margin-bottom: 10px;
            letter-spacing: 5px;
            text-align: center;
        }

        /* The New Forum Button CSS */
        #forum-link {
            margin-bottom: 20px;
            padding: 10px 20px;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            text-align: center;
        }
        #forum-link:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        #game-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1200px;
            margin-top: 20px;
        }

        .game-card {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-blue);
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .game-card:hover {
            transform: scale(1.05) translateY(-5px);
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .preview-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 2px solid var(--neon-blue);
            margin-bottom: 15px;
            image-rendering: pixelated;
        }

        .game-title {
            font-size: 1.8rem;
            text-transform: uppercase;
            margin: 10px 0;
        }

        /* The New Social Stats CSS */
        .social-stats {
            display: flex;
            justify-content: space-around;
            font-size: 1.1rem;
            margin-top: 10px;
            margin-bottom: 15px;
            color: #fff;
        }
        .play-count { color: var(--neon-blue); }
        .likes { color: #0f0; }

        #status { font-size: 1.2rem; color: #555; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>SYSTEM TERMINAL</h1>
    
    <a id="forum-link" href="https://github.com/valdrea/My-Games/issues/new/choose" target="_blank">
        [ ACCESS COMMUNITY FORUM / REPORT BUGS ]
    </a>

    <div id="status">SCANNING DIRECTORIES...</div>

    <div id="game-container">
        </div>
<script>
        // CONFIG
        const USERNAME = 'valdrea';
        const REPO = 'My-Games';
        // A unique namespace for your database so it doesn't cross wires with others
        const NAMESPACE = 'valdrea-terminal-system-v1'; 

        async function scanGames() {
            const container = document.getElementById('game-container');
            const status = document.getElementById('status');

            try {
                // Fetch repository contents
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
                const data = await response.json();

                status.style.display = 'none';

                const folders = data.filter(item => item.type === 'dir');

                if (folders.length === 0) {
                    status.innerHTML = "NO BOOTABLE PROTOCOLS FOUND.";
                    status.style.display = 'block';
                    return;
                }

                folders.forEach(folder => {
                    const gameId = folder.name;
                    
                    // We changed this to a div so we can have multiple clickable buttons inside it
                    const card = document.createElement('div');
                    card.className = 'game-card';

                    card.innerHTML = `
                        <img class="preview-img" src="./${gameId}/preview.png" alt="${gameId}" 
                             onerror="this.src='https://placehold.co/400x250/000/0ff?text=NO+PREVIEW'" 
                             onclick="launchGame('${gameId}')">
                        
                        <div class="game-title" onclick="launchGame('${gameId}')">${gameId.replace(/-/g, ' ')}</div>
                        
                        <div class="social-stats">
                            <span class="play-count">PLAYS: <span id="plays-${gameId}">-</span></span>
                            
                            <span class="likes" style="cursor:pointer;" onclick="addLike('${gameId}')" title="Upvote Protocol">
                                👍 <span id="likes-${gameId}">-</span>
                            </span>
                        </div>

                        <div style="font-size: 0.9rem; cursor:pointer; color: var(--neon-blue);" onclick="launchGame('${gameId}')">
                            [ INITIALIZE PROTOCOL ]
                        </div>
                    `;
                    container.appendChild(card);

                    // Ask the API for the real numbers as soon as the card is built
                    fetchInitialStats(gameId);
                });

            } catch (error) {
                console.error("Scan failed:", error);
                status.innerHTML = "SYSTEM ERROR: FAILED TO READ REPOSITORY.";
                status.style.display = 'block';
            }
        }

        // --- THE DATABASE ROUTINES ---

        async function fetchInitialStats(gameId) {
            try {
                // Fetch Plays
                let playRes = await fetch(`https://api.counterapi.dev/v1/${NAMESPACE}/plays-${gameId}`);
                let playData = await playRes.json();
                document.getElementById(`plays-${gameId}`).innerText = playData.count || 0;

                // Fetch Likes
                let likeRes = await fetch(`https://api.counterapi.dev/v1/${NAMESPACE}/likes-${gameId}`);
                let likeData = await likeRes.json();
                document.getElementById(`likes-${gameId}`).innerText = likeData.count || 0;
            } catch (e) {
                // If the API fails or it's a brand new game, default to 0
                document.getElementById(`plays-${gameId}`).innerText = 0;
                document.getElementById(`likes-${gameId}`).innerText = 0;
            }
        }

        async function addLike(gameId) {
            const likeSpan = document.getElementById(`likes-${gameId}`);
            // Instantly add 1 to the screen so it feels responsive to the user
            likeSpan.innerText = parseInt(likeSpan.innerText || 0) + 1;
            
            // Quietly tell the server to add 1 in the background
            fetch(`https://api.counterapi.dev/v1/${NAMESPACE}/likes-${gameId}/up`);
        }

        async function launchGame(gameId) {
            // Change the text so the user knows it's loading
            document.getElementById(`plays-${gameId}`).innerText = "LOADING...";
            
            // Tell the server someone is playing
            await fetch(`https://api.counterapi.dev/v1/${NAMESPACE}/plays-${gameId}/up`);
            
            // Redirect them into the game folder
            window.location.href = `./${gameId}/index.html`;
        }

        // Boot the system
        scanGames();
    </script>
</body>
</html>
