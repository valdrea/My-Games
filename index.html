<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALDREA • NEON GATEWAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-blue);
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 80s Grid Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 0%, rgba(255, 0, 255, 0.05) 50%),
                        linear-gradient(90deg, transparent 0%, rgba(0, 255, 255, 0.05) 50%);
            background-size: 30px 30px;
            z-index: -1;
        }

        h1 {
            font-size: 4rem;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            margin-bottom: 10px;
            letter-spacing: 5px;
            text-align: center;
        }

        /* Community Forum Link */
        #forum-link {
            margin-bottom: 30px;
            padding: 12px 24px;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            text-decoration: none;
            font-size: 1.4rem;
            transition: all 0.3s ease;
            text-align: center;
        }
        #forum-link:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        #game-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1200px;
            margin-top: 10px;
        }

        .game-card {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-blue);
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: scale(1.05) translateY(-5px);
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .preview-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 2px solid var(--neon-blue);
            margin-bottom: 15px;
            image-rendering: pixelated;
        }

        .game-title {
            font-size: 2rem;
            text-transform: uppercase;
            margin: 10px 0;
        }

        #status { font-size: 1.2rem; color: #555; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>SYSTEM TERMINAL</h1>
    
    <a id="forum-link" href="https://github.com/valdrea/My-Games/issues/new/choose" target="_blank">
        [ ACCESS COMMUNITY FORUM / REPORT BUGS ]
    </a>

    <div id="status">SCANNING DIRECTORIES...</div>

    <div id="game-container"></div>

    <script>
        const USERNAME = 'valdrea';
        const REPO = 'My-Games';

        async function scanGames() {
            const container = document.getElementById('game-container');
            const status = document.getElementById('status');

            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
                const data = await response.json();

                status.style.display = 'none';
                const folders = data.filter(item => item.type === 'dir');

                if (folders.length === 0) {
                    status.innerHTML = "NO BOOTABLE PROTOCOLS FOUND.";
                    status.style.display = 'block';
                    return;
                }

                folders.forEach(folder => {
                    const card = document.createElement('a');
                    card.className = 'game-card';
                    card.href = `./${folder.name}/index.html`;

                    card.innerHTML = `
                        <img class="preview-img" src="./${folder.name}/preview.png" alt="${folder.name}" onerror="this.src='https://placehold.co/400x250/000/0ff?text=NO+PREVIEW'">
                        <div class="game-title">${folder.name.replace(/-/g, ' ')}</div>
                        <div style="font-size: 1rem; color: var(--neon-blue);">[ INITIALIZE PROTOCOL ]</div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                status.innerHTML = "SYSTEM ERROR: FAILED TO READ REPOSITORY.";
                status.style.display = 'block';
            }
        }

        scanGames();
    </script>
</body>
</html>
