<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, orientation=landscape">
    <title>Mahjong Solitaire - Enhanced</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0b2540 0%, #041a32 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 16px;
            overflow-x: auto;
            transition: background 0.8s ease;
        }

        .game-container {
            background: rgba(15, 40, 90, 0.45);
            border-radius: 56px;
            padding: 20px;
            backdrop-filter: blur(4px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: inline-block;
            max-width: 100%;
        }

        .game-panel {
            background: #0f2a4f;
            border-radius: 32px;
            padding: 20px 24px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.4), 0 8px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 16px;
            background: #1c3a6b;
            padding: 10px 24px;
            border-radius: 60px;
        }

        .stats {
            display: flex;
            gap: 20px;
            background: #0a1f3d;
            padding: 6px 18px;
            border-radius: 40px;
            color: #d8e8ff;
            font-weight: bold;
        }

        .stat {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 1.1rem;
        }

        .stat span:first-child {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7cb8ff;
        }

        .stat .value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #7cb8ff;
            text-shadow: 0 2px 2px rgba(0,0,0,0.5);
        }

        .high-score {
            background: #0a1f3d;
            padding: 6px 18px;
            border-radius: 40px;
            color: #d8e8ff;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .high-score span:first-child {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7cb8ff;
        }

        .main-content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 24px;
            margin: 0 auto;
        }

        .canvas-wrapper {
            flex: 0 0 auto;
            transition: all 0.3s ease;
        }

        canvas {
            display: block;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            background: #d8e6f5;
            image-rendering: crisp-edges;
        }

        .sidebar {
            background: #1c3a6b;
            border-radius: 24px;
            padding: 20px 16px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.4), 0 8px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 190px;
            height: fit-content;
        }

        .sidebar select,
        .sidebar button {
            background: #234a85;
            border: none;
            font-weight: bold;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.95rem;
            color: #e0f0ff;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 3px 0 #0f2a4f;
            font-family: inherit;
            width: 100%;
        }

        .sidebar button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0f2a4f;
        }

        .sidebar select {
            background: #1a3a70;
            color: #e0f0ff;
            border: 1px solid #7cb8ff;
        }

        .sidebar button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .bottom-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .bottom-bar button {
            background: #234a85;
            color: #e0f0ff;
            border: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #0f2a4f;
        }

        .bottom-bar button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0f2a4f;
        }

        @media (max-width: 1100px) {
            .main-content {
                flex-direction: column;
                align-items: center;
            }
            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                min-width: auto;
                padding: 14px;
                width: 100%;
                max-width: 620px;
            }
            .top-bar {
                padding: 12px 16px;
                gap: 12px;
            }
        }

        @media (orientation: portrait) {
            body {
                padding: 8px;
            }
            .game-container {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">

        <div class="top-bar">
            <div class="stats">
                <div class="stat"><span>SCORE</span><span class="value" id="scoreValue">0</span></div>
                <div class="stat"><span>MOVES</span><span class="value" id="movesValue">0</span></div>
                <div class="stat"><span>PAIRS LEFT</span><span class="value" id="pairsLeft">72</span></div>
                <div class="stat"><span>TIME</span><span class="value" id="timeValue">0:00</span></div>
            </div>
            
            <div class="high-score">
                <span>BEST</span>
                <span class="value" id="highScoreValue">0</span>
            </div>
        </div>

        <div class="main-content">
            <div class="canvas-wrapper">
                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="sidebar">
                <select id="tileSetSelect">
                    <option value="classic">🎴 Classic</option>
                    <option value="simpsons" selected>🍩 Simpsons</option>
                    <option value="scifi">🚀 Sci-Fi</option>
                </select>
                <select id="difficultySelect">
                    <option value="easy">🍃 Easy</option>
                    <option value="normal" selected>⚖️ Normal</option>
                    <option value="hard">🔥 Hard</option>
                </select>
                <select id="layoutSelect">
                    <option value="0">Pyramid</option>
                    <option value="1">Turtle</option>
                    <option value="2">Dragon</option>
                    <option value="3">Fortress</option>
                </select>
                
                <button id="colorModeBtn">🎨 Color ON</button>
                <button id="musicToggleBtn">🎵 Music On</button>
                <button id="soundToggleBtn">🔊 SFX On</button>
                <button id="moodBtn">🌈 Mood</button>
                <button id="fullscreenBtn">🖥️ Fullscreen</button>
            </div>
        </div>

        <div class="bottom-bar">
            <button id="shuffleBtn">🃏 Shuffle (<span id="shuffleCount">3</span>)</button>
            <button id="undoBtn">↩️ Undo (<span id="undoCount">5</span>)</button>
            <button id="hintBtn">💡 Hint (<span id="hintCount">1</span>)</button>
            <button id="resetBtn">🔄 New Game</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ==================== ENHANCED MAHJONG SOLITAIRE v3.2 ====================
        // • Music now loads from the real URL: https://valdrea.github.io/My-Games/fantasy-mahjong/assets/music.ogg
        // • Color Mode is now ON by default (as requested)
        // • All previous enhancements kept (larger tiles, cobalt UI, 3D bevel, 4 layouts, etc.)

        const SCALE = 1.15;
        const TILE_W = Math.round(84 * SCALE);
        const TILE_H = Math.round(100 * SCALE);
        const LAYER_OFFSET = Math.round(8 * SCALE);

        function generateLayout(layoutId) {
            const positions = [];
            const colSpacing = TILE_W - Math.round(12 * SCALE);
            const rowSpacing = TILE_H - Math.round(16 * SCALE);
            let startX = Math.round(60 * SCALE);
            const startY = Math.round(70 * SCALE);

            if (layoutId === 1) startX = Math.round(40 * SCALE);
            if (layoutId === 2) startX = Math.round(75 * SCALE);
            if (layoutId === 3) startX = Math.round(50 * SCALE);

            const layer0Cols = layoutId === 1 ? 14 : 12;
            const layer0Rows = layoutId === 3 ? 8 : 7;

            for (let row = 0; row < layer0Rows; row++) {
                for (let col = 0; col < layer0Cols; col++) {
                    if ((row === 0 && (col < 2 || col > (layoutId === 1 ? 11 : 9))) ||
                        (row === (layoutId === 3 ? 7 : 6) && (col < 2 || col > (layoutId === 1 ? 11 : 9))) ||
                        (row === 1 && (col === 0 || col === (layoutId === 1 ? 13 : 11))) ||
                        (row === (layoutId === 3 ? 6 : 5) && (col === 0 || col === (layoutId === 1 ? 13 : 11)))) continue;
                    positions.push({ x: startX + col * colSpacing, y: startY + row * rowSpacing, layer: 0 });
                }
            }

            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < (layoutId === 2 ? 11 : 10); col++) {
                    if ((row === 0 && (col < 2 || col > (layoutId === 2 ? 8 : 7))) || 
                        (row === 4 && (col < 2 || col > (layoutId === 2 ? 8 : 7)))) continue;
                    positions.push({ x: startX + Math.round(30 * SCALE) + col * colSpacing, y: startY + Math.round(45 * SCALE) + row * rowSpacing, layer: 1 });
                }
            }

            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < (layoutId === 3 ? 9 : 8); col++) {
                    if ((row === 0 && (col < 1 || col > (layoutId === 3 ? 7 : 6))) || 
                        (row === 3 && (col < 1 || col > (layoutId === 3 ? 7 : 6)))) continue;
                    positions.push({ x: startX + Math.round(60 * SCALE) + col * colSpacing, y: startY + Math.round(85 * SCALE) + row * rowSpacing, layer: 2 });
                }
            }

            for (let row = 0; row < (layoutId === 0 ? 3 : 4); row++) {
                for (let col = 0; col < (layoutId === 2 ? 7 : 6); col++) {
                    if ((row === 0 && (col < 1 || col > (layoutId === 2 ? 5 : 4))) || 
                        (row === (layoutId === 0 ? 2 : 3) && (col < 1 || col > (layoutId === 2 ? 5 : 4)))) continue;
                    positions.push({ x: startX + Math.round(90 * SCALE) + col * colSpacing, y: startY + Math.round(125 * SCALE) + row * rowSpacing, layer: 3 });
                }
            }

            while (positions.length > 144) positions.pop();
            while (positions.length < 144) positions.push({ x: startX + 300, y: startY + 300, layer: 0 });
            return positions;
        }

        let layoutPositions = generateLayout(0);
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: true });

        let boardScale = 1;

        function setCanvasSize() {
            let maxX = 0, maxY = 0;
            layoutPositions.forEach(pos => {
                maxX = Math.max(maxX, pos.x + TILE_W);
                maxY = Math.max(maxY, pos.y + TILE_H);
            });
            const logicalWidth = maxX + Math.round(80 * SCALE);
            const logicalHeight = maxY + Math.round(80 * SCALE);

            canvas.width = logicalWidth;
            canvas.height = logicalHeight;

            const maxW = window.innerWidth * 0.88;
            const maxH = window.innerHeight * 0.62;
            boardScale = Math.min(maxW / logicalWidth, maxH / logicalHeight, 1.35);

            canvas.style.width = `${logicalWidth * boardScale}px`;
            canvas.style.height = `${logicalHeight * boardScale}px`;
        }

        const CLASSIC_NAMES = ["1 Bamboo","2 Bamboo","3 Bamboo","4 Bamboo","5 Bamboo","6 Bamboo","7 Bamboo","8 Bamboo","9 Bamboo","1 Char","2 Char","3 Char","4 Char","5 Char","6 Char","7 Char","8 Char","9 Char","1 Dot","2 Dot","3 Dot","4 Dot","5 Dot","6 Dot","7 Dot","8 Dot","9 Dot","East","South","West","North","Red Dragon","Green Dragon","White Dragon","Flower","Season"];
        const SCI_FI_ICONS = ["🐉","🗡️","🧙","🧝","🏰","🔮","⚔️","🛡️","🐲","🧚","🌙","✨","🔥","❄️","🌊","🌪️","🌿","💎","👑","🐺","🦄","🐉","🏹","🔱","🧨","📜","🧬","🤖","🚀","🛸","👾","⚙️","🔧","🌌","🧠","🌀"];
        const SIMPSONS_ICONS = ["😀 Homer","🍩 Donut","💛 Bart","🎷 Lisa","🧸 Maggie","👨‍🦲 Burns","🍔 Krusty","🍺 Moe","🐱 Snowball","🐟 Blinky","🏆 Duff","🚌 School","💚 Alien","🛹 Skate","📺 TV","💀 Sideshow","🔫 Wiggum","👮 Chief","🧪 Frink","🍩 Lard","🌭 Apu","🐧 Pinchy","🐷 Plopper","🎈 Itchy","🐭 Scratchy","🏈 Milhouse","🤓 Nelson","🎸 Otto","📰 Comic","🍩 Homer2","🧁 Marge","🍩 Homer3","👾 Kang","👽 Kodos","💎 Gem","🌸 Flower"];

        let tiles = [];
        let selectedTile = null;
        let score = 0;
        let moves = 0;
        let hintTokens = 1;
        let shufflesLeft = { easy: Infinity, normal: 3, hard: 1 };
        let undosLeft = { easy: Infinity, normal: 5, hard: 2 };
        let moveHistory = [];
        let currentDifficulty = "normal";
        let currentTileSet = "simpsons";
        let currentLayoutId = 0;
        let unlockedLayouts = [0];
        let musicEnabled = true;
        let sfxEnabled = true;
        let colorMode = true;          // ← NOW ON BY DEFAULT
        let gameOver = false;
        let winFlag = false;
        let gameStarted = false;
        let elapsedSeconds = 0;
        let timerInterval = null;

        const scoreSpan = document.getElementById('scoreValue');
        const movesSpan = document.getElementById('movesValue');
        const pairsLeftSpan = document.getElementById('pairsLeft');
        const timeSpan = document.getElementById('timeValue');
        const hintCountSpan = document.getElementById('hintCount');
        const highScoreSpan = document.getElementById('highScoreValue');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const undoBtn = document.getElementById('undoBtn');
        const hintBtn = document.getElementById('hintBtn');
        const resetBtn = document.getElementById('resetBtn');
        const tileSetSelect = document.getElementById('tileSetSelect');
        const difficultySelect = document.getElementById('difficultySelect');
        const layoutSelect = document.getElementById('layoutSelect');
        const musicToggleBtn = document.getElementById('musicToggleBtn');
        const soundToggleBtn = document.getElementById('soundToggleBtn');
        const colorModeBtn = document.getElementById('colorModeBtn');
        const moodBtn = document.getElementById('moodBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let bgMusic = null;

        // === REAL MUSIC LOADING (fixed) ===
        function initMusic() {
            if (bgMusic) {
                bgMusic.pause();
                bgMusic = null;
            }
            if (!musicEnabled) return;

            bgMusic = new Audio('https://valdrea.github.io/My-Games/fantasy-mahjong/assets/music.ogg');
            bgMusic.loop = true;
            bgMusic.volume = 0.35;
            
            bgMusic.play().catch(() => {
                // Autoplay blocked → wait for first user tap
                const unlock = () => {
                    if (bgMusic && musicEnabled) bgMusic.play().catch(() => {});
                    document.removeEventListener('click', unlock);
                    document.removeEventListener('touchstart', unlock);
                };
                document.addEventListener('click', unlock);
                document.addEventListener('touchstart', unlock);
            });
        }

        function toggleMusic() {
            musicEnabled = !musicEnabled;
            musicToggleBtn.innerText = musicEnabled ? "🎵 Music On" : "🔇 Music Off";
            if (musicEnabled) {
                initMusic();
            } else if (bgMusic) {
                bgMusic.pause();
            }
        }

        function playSFX(type) {
            if (!sfxEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain).connect(audioCtx.destination);
                gain.gain.value = 0.25;

                if (type === 'match') { osc.frequency.setValueAtTime(880, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35); }
                else if (type === 'hint') { osc.frequency.setValueAtTime(1568, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25); }
                else if (type === 'shuffle') { osc.frequency.setValueAtTime(440, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45); }
                else if (type === 'undo') { osc.frequency.setValueAtTime(660, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3); }
                else if (type === 'win') { osc.frequency.setValueAtTime(1318, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.4); }
                else if (type === 'error') { osc.frequency.setValueAtTime(220, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25); }

                osc.start();
                osc.stop(audioCtx.currentTime + 1);
            } catch(e) {}
        }

        function getTileColor(typeIdx) {
            const hue = (typeIdx * 11) % 360;
            return `hsl(${hue}, 75%, 48%)`;
        }
        function getTextColor(bgColor) {
            const match = bgColor.match(/hsl\((\d+),\s*(\d+)%,\s*(\d+)%\)/);
            return match && parseInt(match[3]) > 55 ? "#111" : "#fff";
        }

        function drawBeveledTile(ctx, x, y, fillColor, textColor, strokeColor, isSelected) {
            ctx.shadowColor = "rgba(0,0,0,0.55)";
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = Math.round(6 * SCALE);
            ctx.shadowOffsetY = Math.round(8 * SCALE);
            ctx.fillStyle = "#222";
            ctx.fillRect(x + Math.round(7 * SCALE), y + Math.round(7 * SCALE), TILE_W, TILE_H);

            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            ctx.fillStyle = fillColor;
            ctx.fillRect(x, y, TILE_W, TILE_H);

            ctx.fillStyle = "rgba(255,255,255,0.75)";
            ctx.fillRect(x + 4, y + 4, TILE_W - 8, Math.round(11 * SCALE));
            ctx.fillRect(x + 4, y + 4, Math.round(11 * SCALE), TILE_H - 8);

            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.fillRect(x + 4, y + TILE_H - Math.round(12 * SCALE), TILE_W - 8, Math.round(11 * SCALE));
            ctx.fillRect(x + TILE_W - Math.round(12 * SCALE), y + 4, Math.round(11 * SCALE), TILE_H - 8);

            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 4;
            ctx.strokeRect(x + 4, y + 4, TILE_W - 8, TILE_H - 8);

            if (isSelected) {
                ctx.shadowBlur = 14;
                ctx.shadowColor = "#7cb8ff";
                ctx.strokeStyle = "#7cb8ff";
                ctx.lineWidth = 7;
                ctx.strokeRect(x + 3, y + 3, TILE_W - 6, TILE_H - 6);
                ctx.shadowBlur = 0;
            }
        }

        function renderClassic(ctx, x, y, type, selected, colorModeOn) {
            let fillColor = colorModeOn ? getTileColor(type) : "#FDF8E7";
            let textColor = colorModeOn ? getTextColor(fillColor) : "#8B5A2B";
            let strokeColor = "#B87C4F";
            drawBeveledTile(ctx, x, y, fillColor, textColor, strokeColor, selected);

            ctx.fillStyle = textColor;
            ctx.font = `bold ${Math.min(39, TILE_W * 0.48)}px KaiTi, Georgia`;
            let symbol = CLASSIC_NAMES[type] || "?";
            if (type < 9) symbol = `${type + 1}│`;
            else if (type < 18) symbol = `${type - 8}萬`;
            else if (type < 27) symbol = `●${type - 17}`;
            else if (type < 31) symbol = ["E","S","W","N"][type - 27];
            else if (type < 34) symbol = ["中","發","白"][type - 31];
            else symbol = type === 34 ? "🌸" : "🍂";
            ctx.fillText(symbol, x + TILE_W / 3.2, y + TILE_H / 1.55);
        }

        function renderSimpsons(ctx, x, y, type, selected, colorModeOn) {
            let fillColor = colorModeOn ? getTileColor(type) : "#F9E076";
            let textColor = colorModeOn ? getTextColor(fillColor) : "#4A2512";
            let strokeColor = "#222";
            drawBeveledTile(ctx, x, y, fillColor, textColor, strokeColor, selected);

            const txt = SIMPSONS_ICONS[type % SIMPSONS_ICONS.length] || "Simp";
            ctx.fillStyle = textColor;
            ctx.font = `bold ${Math.round(30 * SCALE)}px "Comic Neue", sans-serif`;
            ctx.fillText(txt.substring(0, 3), x + Math.round(14 * SCALE), y + Math.round(55 * SCALE));
            ctx.font = `${Math.round(15 * SCALE)}px system-ui`;
            ctx.fillText(txt.substring(0, 8), x + Math.round(14 * SCALE), y + Math.round(90 * SCALE));
        }

        function renderSciFi(ctx, x, y, type, selected, colorModeOn) {
            let fillColor = colorModeOn ? getTileColor(type) : "#1a2a3a";
            let textColor = colorModeOn ? getTextColor(fillColor) : "#c0e0ff";
            let strokeColor = "#fff";
            drawBeveledTile(ctx, x, y, fillColor, textColor, strokeColor, selected);

            const icon = SCI_FI_ICONS[type % SCI_FI_ICONS.length];
            ctx.fillStyle = textColor;
            ctx.font = `${Math.round(55 * SCALE)}px system-ui`;
            ctx.fillText(icon, x + TILE_W / 2 - Math.round(26 * SCALE), y + TILE_H / 2 + Math.round(20 * SCALE));
        }

        const tileSetRenderers = { classic: renderClassic, simpsons: renderSimpsons, scifi: renderSciFi };

        function isTileFree(tile) {
            if (tile.removed) return false;
            const above = tiles.find(t => !t.removed && t.layer === tile.layer + 1 &&
                Math.abs(t.x - tile.x) < TILE_W * 0.75 && Math.abs(t.y - tile.y) < TILE_H * 0.75);
            if (above) return false;

            const sameLayer = tiles.filter(t => !t.removed && t.layer === tile.layer && t.id !== tile.id);
            let blockedLeft = false, blockedRight = false;
            for (let other of sameLayer) {
                const horizGap = other.x - tile.x;
                const vertOverlap = Math.abs(other.y - tile.y);
                if (vertOverlap < TILE_H * 0.75) {
                    if (horizGap < 0 && Math.abs(horizGap) < TILE_W * 0.9) blockedLeft = true;
                    if (horizGap > 0 && horizGap < TILE_W * 0.9) blockedRight = true;
                }
            }
            return !(blockedLeft && blockedRight);
        }

        function getFreeTiles() { return tiles.filter(t => !t.removed && isTileFree(t)); }
        function findValidPairs() {
            const free = getFreeTiles();
            const pairs = [];
            for (let i = 0; i < free.length; i++) {
                for (let j = i + 1; j < free.length; j++) {
                    if (free[i].type === free[j].type) pairs.push([free[i], free[j]]);
                }
            }
            return pairs;
        }
        function canMakeMove() { return findValidPairs().length > 0; }

        function attemptMatch(tileA, tileB) {
            if (tileA === tileB || tileA.type !== tileB.type || !isTileFree(tileA) || !isTileFree(tileB)) return false;
            tileA.removed = true; tileB.removed = true;

            const mult = currentDifficulty === "easy" ? 1 : (currentDifficulty === "normal" ? 1.6 : 2.8);
            const points = Math.floor(10 * mult);
            score += points; moves++;

            moveHistory.push({ tileAId: tileA.id, tileBId: tileB.id, scoreDelta: points });

            playSFX('match');
            updateUI();

            if (tileA.type === 34 || tileA.type === 35) {
                hintTokens++; hintCountSpan.innerText = hintTokens;
                playSFX('hint');
            }
            checkWin();
            return true;
        }

        function shuffleRemaining() {
            const remaining = tiles.filter(t => !t.removed);
            if (remaining.length === 0) return;

            let types = remaining.map(t => t.type);
            let attempts = 0;
            const maxAttempts = 100;
            let hasValidPair = false;

            while (!hasValidPair && attempts < maxAttempts) {
                for (let i = types.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [types[i], types[j]] = [types[j], types[i]];
                }
                let idx = 0;
                for (let t of tiles) if (!t.removed) t.type = types[idx++];
                hasValidPair = canMakeMove();
                attempts++;
            }

            playSFX('shuffle');
            selectedTile = null;
            render();
            updateUI();
        }

        function giveHint() {
            if (hintTokens <= 0) { playSFX('error'); alert("No hint tokens left!\nMatch Flower or Season tiles to earn more."); return; }
            const pairs = findValidPairs();
            if (pairs.length === 0) { playSFX('error'); alert("No moves left. Try Shuffle!"); return; }
            const [a, b] = pairs[0];
            hintTokens--; hintCountSpan.innerText = hintTokens;
            playSFX('hint');
            flashTile(a); flashTile(b);
            setTimeout(() => { selectedTile = a; render(); }, 280);
        }

        function flashTile(tile) {
            if (!tile || tile.removed) return;
            let count = 0;
            const flash = () => {
                if (count++ > 5) { render(); return; }
                render();
                ctx.save();
                tileSetRenderers[currentTileSet](ctx, tile.x, tile.y, tile.type, true, colorMode);
                ctx.restore();
                setTimeout(flash, 110);
            };
            flash();
        }

        function checkWin() {
            const remaining = tiles.filter(t => !t.removed).length;
            pairsLeftSpan.innerText = remaining / 2 | 0;

            if (remaining === 0 && !gameOver) {
                gameOver = true; winFlag = true;
                if (timerInterval) clearInterval(timerInterval);
                playSFX('win');

                if (currentLayoutId + 1 < 4 && !unlockedLayouts.includes(currentLayoutId + 1)) {
                    unlockedLayouts.push(currentLayoutId + 1);
                    localStorage.setItem('mahjong_unlocked_layouts', JSON.stringify(unlockedLayouts));
                    populateLayoutSelect();
                    alert(`🎉 Victory!\n\nNew layout unlocked: ${layoutSelect.options[currentLayoutId + 1].text}`);
                }

                const key = `mahjong_high_${currentDifficulty}_${currentTileSet}_${currentLayoutId}`;
                const previousBest = parseInt(localStorage.getItem(key) || "0");
                if (score > previousBest) {
                    localStorage.setItem(key, score);
                    updateHighScoreDisplay();
                    alert(`🎉 VICTORY! ✨\nNew High Score: ${score} 🎉`);
                } else {
                    alert(`🎉 VICTORY! ✨\nFinal Score: ${score}`);
                }
                render();
            }

            if (!canMakeMove() && remaining > 0 && !gameOver) {
                if (confirm("No moves left!\nShuffle to continue?")) handleShuffle();
                else gameOver = true;
            }
        }

        function handleShuffle() {
            if (gameOver) return;
            if (currentDifficulty !== "easy" && shufflesLeft[currentDifficulty] <= 0) {
                alert(`No shuffles left on ${currentDifficulty} difficulty!`); return;
            }
            if (currentDifficulty !== "easy") shufflesLeft[currentDifficulty]--;
            shuffleRemaining();
            updateControlButtons();
            updateUI();
        }

        function handleUndo() {
            if (gameOver || moveHistory.length === 0) return;
            if (currentDifficulty !== "easy" && undosLeft[currentDifficulty] <= 0) {
                alert("No undos left on this difficulty!"); return;
            }
            if (currentDifficulty !== "easy") undosLeft[currentDifficulty]--;

            const last = moveHistory.pop();
            const tileA = tiles.find(t => t.id === last.tileAId);
            const tileB = tiles.find(t => t.id === last.tileBId);
            if (tileA && tileB) {
                tileA.removed = false; tileB.removed = false;
                score = Math.max(0, score - last.scoreDelta);
                moves = Math.max(0, moves - 1);
                playSFX('undo');
                updateUI();
                updateControlButtons();
                render();
            }
        }

        function resetGame() {
            shufflesLeft = { easy: Infinity, normal: 3, hard: 1 };
            undosLeft = { easy: Infinity, normal: 5, hard: 2 };
            moveHistory = [];

            let baseTypes = [];
            for (let i = 0; i < 36; i++) for (let j = 0; j < 4; j++) baseTypes.push(i);
            for (let i = baseTypes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [baseTypes[i], baseTypes[j]] = [baseTypes[j], baseTypes[i]];
            }

            tiles = layoutPositions.map((pos, idx) => ({
                id: idx,
                x: pos.x,
                y: pos.y + (pos.layer * LAYER_OFFSET),
                layer: pos.layer,
                type: baseTypes[idx],
                removed: false
            }));

            selectedTile = null; score = 0; moves = 0; hintTokens = 1;
            gameOver = false; winFlag = false; gameStarted = false; elapsedSeconds = 0;
            if (timerInterval) clearInterval(timerInterval); timerInterval = null;

            hintCountSpan.innerText = hintTokens;
            timeSpan.innerText = "0:00";
            updateUI();
            updateControlButtons();
            updateHighScoreDisplay();
            render();
            playSFX('shuffle');
        }

        function updateUI() {
            scoreSpan.innerText = Math.floor(score);
            movesSpan.innerText = moves;
            const remaining = tiles.filter(t => !t.removed).length;
            pairsLeftSpan.innerText = remaining / 2 | 0;
        }

        function updateControlButtons() {
            shuffleBtn.innerHTML = `🃏 Shuffle (${currentDifficulty === "easy" ? "∞" : shufflesLeft[currentDifficulty]})`;
            undoBtn.innerHTML = `↩️ Undo (${currentDifficulty === "easy" ? "∞" : undosLeft[currentDifficulty]})`;
        }

        function updateHighScoreDisplay() {
            const key = `mahjong_high_${currentDifficulty}_${currentTileSet}_${currentLayoutId}`;
            const best = localStorage.getItem(key) || "0";
            highScoreSpan.innerText = best;
        }

        function populateLayoutSelect() {
            Array.from(layoutSelect.options).forEach(opt => {
                const id = parseInt(opt.value);
                if (!unlockedLayouts.includes(id) && id !== currentLayoutId) {
                    opt.disabled = true;
                    opt.text = opt.text + " 🔒";
                } else {
                    opt.disabled = false;
                    opt.text = opt.text.replace(" 🔒", "");
                }
            });
        }

        function startTimer() {
            if (timerInterval) return;
            elapsedSeconds = 0;
            timeSpan.innerText = "0:00";
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                const m = Math.floor(elapsedSeconds / 60);
                const s = elapsedSeconds % 60;
                timeSpan.innerText = `${m}:${s < 10 ? "0" : ""}${s}`;
            }, 1000);
        }

        function getTileAtPixel(px, py) {
            for (let i = tiles.length - 1; i >= 0; i--) {
                const t = tiles[i];
                if (!t.removed && px >= t.x && px <= t.x + TILE_W && py >= t.y && py <= t.y + TILE_H) return t;
            }
            return null;
        }

        function onCanvasClick(e) {
            if (gameOver) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;

            const tile = getTileAtPixel(canvasX, canvasY);
            if (!tile) { selectedTile = null; render(); return; }

            if (!gameStarted) { gameStarted = true; startTimer(); }

            if (!isTileFree(tile)) { playSFX('error'); selectedTile = null; render(); return; }

            if (!selectedTile) { selectedTile = tile; render(); return; }
            if (selectedTile === tile) { selectedTile = null; render(); return; }

            const success = attemptMatch(selectedTile, tile);
            selectedTile = null;
            render();
            if (!success) playSFX('error');
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#d8e6f5";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const sorted = [...tiles].sort((a, b) => a.layer - b.layer);
            for (let tile of sorted) {
                if (tile.removed) continue;
                tileSetRenderers[currentTileSet](ctx, tile.x, tile.y, tile.type, (selectedTile === tile), colorMode);
            }

            if (gameOver && winFlag) {
                ctx.save();
                ctx.shadowBlur = 12; ctx.shadowColor = "#7cb8ff";
                ctx.font = "bold 42px 'Segoe UI'"; ctx.fillStyle = "#7cb8ff"; ctx.textAlign = "center";
                ctx.fillText("🏆 VICTORY 🏆", canvas.width / 2, 85);
                ctx.restore();
            }
        }

        function changeTileSet() {
            currentTileSet = tileSetSelect.value;
            updateHighScoreDisplay();
            render();
        }

        function changeDifficulty() {
            currentDifficulty = difficultySelect.value;
            resetGame();
        }

        function changeLayout() {
            const newId = parseInt(layoutSelect.value);
            if (!unlockedLayouts.includes(newId)) {
                alert("This layout is locked!\nWin a game on the current layout to unlock it.");
                layoutSelect.value = currentLayoutId;
                return;
            }
            currentLayoutId = newId;
            layoutPositions = generateLayout(currentLayoutId);
            setCanvasSize();
            resetGame();
        }

        function toggleColorMode() {
            colorMode = !colorMode;
            colorModeBtn.innerText = colorMode ? "🎨 Color ON" : "🎨 Color OFF";
            render();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        function randomizeMood() {
            const h1 = Math.random() * 360;
            const h2 = (h1 + 30 + Math.random() * 120) % 360;
            const sat = 55 + Math.random() * 35;
            document.body.style.background = `linear-gradient(145deg, hsl(${h1},${sat}%,18%) 0%, hsl(${h2},${sat}%,9%) 100%)`;
            playSFX('shuffle');
        }

        // Wire up buttons
        musicToggleBtn.onclick = toggleMusic;
        soundToggleBtn.onclick = () => { sfxEnabled = !sfxEnabled; soundToggleBtn.innerText = sfxEnabled ? "🔊 SFX On" : "🔇 SFX Off"; };
        colorModeBtn.onclick = toggleColorMode;
        moodBtn.onclick = randomizeMood;
        fullscreenBtn.onclick = toggleFullscreen;
        shuffleBtn.onclick = () => { if (!gameOver) handleShuffle(); else resetGame(); };
        undoBtn.onclick = handleUndo;
        hintBtn.onclick = () => { if (!gameOver) giveHint(); };
        resetBtn.onclick = resetGame;
        tileSetSelect.onchange = changeTileSet;
        difficultySelect.onchange = changeDifficulty;
        layoutSelect.onchange = changeLayout;

        canvas.addEventListener('mousedown', onCanvasClick);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onCanvasClick(e); }, { passive: false });

        document.addEventListener('fullscreenchange', () => {
            fullscreenBtn.innerText = document.fullscreenElement ? "🖥️ Exit Full" : "🖥️ Fullscreen";
        });

        function startGame() {
            const saved = localStorage.getItem('mahjong_unlocked_layouts');
            if (saved) unlockedLayouts = JSON.parse(saved);
            if (!unlockedLayouts.includes(0)) unlockedLayouts = [0];

            setCanvasSize();
            populateLayoutSelect();
            resetGame();
            initMusic();           // ← real music now loads
            render();
            console.log('%c✅ Mahjong Solitaire v3.2 ready • Music fixed • Color ON by default', 'color:#7cb8ff; font-weight:bold');
        }

        window.addEventListener('resize', () => {
            setCanvasSize();
            render();
        });

        startGame();
    })();
</script>
</body>
